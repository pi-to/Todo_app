{% extends "base.html" %}

{% block body %}
<div class="card w-50 " style="margin: auto;">
    <div class="card-body">
      <h2 class="card-title">{{ post.title }}<span class="ml-3" style="font-size: 0.5em;">期限：{{ post.due.date() }}</span></h2>
      <p>{{ post.detail }}</p>
      <a class="btn btn-outline-success" href="update/{{ post.id }}" role="button">Update</a>
      <a class="btn btn-outline-primary" href="/" role="button">Return</a>
    </div>
</div>
{% endblock %}
