{% extends "base.html" %}

{% block body %}
<form class="m-5" action="/" method="POST" >

    <div class="form-group">
      <label>Title<input type="text" class="form-control" name="title"></label>
    </div>
    <div class="form-group">
        <label>Detail<input type="text" class="form-control" name="detail"></label>
    </div>
    <div class="form-group">
        <label>Due<input type="date" class="form-control" name="due" required></label>
    </div>
    <button type="submit" class="btn btn-primary">Create</button>
    <a class="btn btn-outline-primary" href="/" role="button">Return</a>
</form>


{% endblock %}
